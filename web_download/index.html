<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treadom — İndir</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; font-family: -apple-system, system-ui, sans-serif;
      background: radial-gradient(circle at 50% 30%, #1e2750, #0e1430);
      color: #e7eaf3; padding: 24px;
    }
    .card { max-width: 420px; width: 100%; text-align: center; }
    .logo {
      width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px;
      background: linear-gradient(135deg, #2a3568, #0e1430);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }
    .logo svg { width: 70px; height: 70px; }
    h1 { font-size: 30px; margin: 0 0 6px; letter-spacing: -.5px; }
    p.sub { color: #9aa3c0; margin: 0 0 28px; }
    a.btn {
      display: block; text-decoration: none; padding: 16px; border-radius: 16px;
      font-weight: 700; font-size: 17px; margin-bottom: 12px;
    }
    a.primary { background: #14b8a6; color: #06281f; }
    a.secondary { background: #1e2750; color: #e7eaf3; border: 1px solid #36406e; }
    .hint { color: #7c8aa0; font-size: 13px; margin-top: 20px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="52" r="30" stroke="#fff" stroke-width="6"/>
        <polygon points="50,28 44,52 56,52" fill="#fff"/>
        <polygon points="50,76 44,52 56,52" fill="#fff" opacity=".5"/>
        <polygon points="26,52 50,46 50,58" fill="#fff" opacity=".6"/>
        <polygon points="74,52 50,46 50,58" fill="#fff" opacity=".6"/>
        <rect x="48.5" y="14" width="3" height="16" fill="#fff"/>
        <polygon points="51.5,14 64,19 51.5,24" fill="#14b8a6"/>
      </svg>
    </div>
    <h1>Treadom</h1>
    <p class="sub">Yürü. Fethet. Haritaya hükmet.</p>

    <a class="btn primary" href="treadom.zip" download="Treadom.apk">📥 İndir (önerilen, ~23&nbsp;MB)</a>
    <a class="btn secondary" href="treadom-full.zip" download="Treadom-full.apk">Tüm cihazlar için tam APK (~58&nbsp;MB)</a>

    <p class="hint">
      İndirdikten sonra APK'ya dokun → "Bilinmeyen kaynaklara izin ver" → Kur.<br/>
      İlk açılışta konum + bildirim izni ister; internet gerekir.
    </p>
  </div>
</body>
</html>
